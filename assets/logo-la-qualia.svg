<svg width="440" height="120" viewBox="0 0 440 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Logo La Qualia</title>
  <desc id="desc">Symbole Q doré et nom La Qualia.</desc>
  <defs>
    <linearGradient id="qg" x1="22" y1="22" x2="138" y2="98" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCC66D"/>
      <stop offset="0.52" stop-color="#FF8C6D"/>
      <stop offset="1" stop-color="#F4B7C1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
